server:
  port: 8080
  servlet:
    context-path: /sportlink

spring:
  datasource:
    url: "jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=REQUIRED"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

app:
  upload:
    dir: uploads/avatars

jwt:
  signer-key: ${JWT_SIGNER_KEY}
  valid-duration: 86400
  refreshable-duration: 604800

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}
  token-url: https://oauth2.googleapis.com/token
  user-info-url: https://www.googleapis.com/oauth2/v3/userinfo

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY}
    url: https://api.deepseek.com
    model: deepseek-chat