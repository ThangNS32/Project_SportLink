server:
  port: 8080
  servlet:
    context-path: /sportlink

spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/sportlink"
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: false
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          format_sql: true

jwt:
  signer-key: "YOUR_JWT_SECRET_KEY"
  valid-duration: 86400
  refreshable-duration: 604800

google:
  client-id: YOUR_GOOGLE_CLIENT_ID
  client-secret: YOUR_GOOGLE_CLIENT_SECRET
  redirect-uri: http://localhost:5173/auth/google/callback
  token-url: https://oauth2.googleapis.com/token
  user-info-url: https://www.googleapis.com/oauth2/v3/userinfo
